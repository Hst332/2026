name: Daily Forecast

# Werktags (Mo-Fr) um 7:00 Uhr Wien-Zeit (CET/CEST)
on:
  schedule:
    - cron: "0 6 * * 1-5"  # 6:00 UTC = 7:00 CET
  workflow_dispatch:  # Optional: manuell auslösbar

jobs:
  forecast:
    runs-on: ubuntu-24.04

    steps:
      # 1️⃣ Repository auschecken
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Python einrichten
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      # 3️⃣ Abhängigkeiten installieren (falls vorhanden)
      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "No dependencies"
          fi

      # 4️⃣ main.py ausführen
      - name: Run Forecast Script
        run: python main.py

      # 5️⃣ Ergebnis hochladen
      - name: Upload Forecast Artifact
        uses: actions/upload-artifact@v4
        with:
          name: forecast-output
          path: forecast_output.txt
