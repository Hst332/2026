name: Daily Forecast

on:
  schedule:
    - cron: '0 6 * * 1-5'  # 7 Uhr Wien-Zeit = UTC+1 → 6 Uhr UTC, Mo-Fr
  workflow_dispatch:

jobs:
  forecast:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install dependencies if available
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "No dependencies"
          fi

      - name: Run forecast script
        run: python main.py

      - name: Upload forecast artifact
        uses: actions/upload-artifact@v4
        with:
          name: forecast-output
          path: forecast_output.txt
          if-no-files-found: error    # statt warn, so sehen wir sofort, wenn nix da ist
          overwrite: true             # wichtig! überschreibt alte Artifacts

