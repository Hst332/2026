name: Daily Forecast

on:
  schedule:
    - cron: '0 6 * * 1-5'  # 7 Uhr Wien-Zeit = UTC+1 → 6 Uhr UTC, Mo-Fr
  workflow_dispatch:

jobs:
  forecast:
    runs-on: ubuntu-24.04

    steps:
      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          python -m pip install pandas numpy scikit-learn yfinance
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy yfinance scikit-learn


      - name: Run forecast script
        run: python main.py

      - name: Upload forecast artifact
        uses: actions/upload-artifact@v4
        with:
          name: forecast-output
          path: forecast_output.txt
          if-no-files-found: error    # statt warn, so sehen wir sofort, wenn nix da ist
          overwrite: true             # wichtig! überschreibt alte Artifacts
          
      - name: Commit forecast output (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add forecast_output.txt
          git diff --cached --quiet || git commit -m "Update forecast output [skip ci]"
          git push origin main || true

      - name: Run SILVER Backtest
        run: python SILVER_BACKTEST.py
        
      - name: Run Gold Backtest
        run: python GOLD_BACKTEST.py



