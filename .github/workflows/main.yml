name: Daily Forecast Push

# Werktags (Mo-Fr) um 7:00 Uhr Wien-Zeit (CET/CEST)
on:
  schedule:
    - cron: "0 6 * * 1-5"  # 6:00 UTC = 7:00 CET
  workflow_dispatch:  # Optional: manuell auslösbar

jobs:
  forecast:
    runs-on: ubuntu-24.04

    steps:
      # 1️⃣ Repository auschecken
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true  # wichtig für push
          fetch-depth: 0  # gesamte Historie für push

      # 2️⃣ Python einrichten
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      # 3️⃣ Abhängigkeiten installieren
      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "No dependencies"
          fi

      # 4️⃣ Forecast Script ausführen
      - name: Run Forecast Script
        run: python main.py

      # 5️⃣ Prüfen, ob forecast_output.txt geändert wurde
      - name: Commit Forecast Output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add forecast_output.txt
          # Nur committen, wenn sich die Datei geändert hat
          if ! git diff --cached --quiet; then
            git commit -m "Daily forecast update $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push origin main
          else
            echo "No changes to push."
          fi
