name: Forecast

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  forecast:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install dependencies if requirements.txt exists
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "No dependencies"
          fi

      - name: Run forecast script
        run: python main.py

      - name: Commit and push forecast output
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Immer die Datei hinzufügen und committen
          git add forecast_output.txt

          # Prüfen, ob es Änderungen gibt, ansonsten "force commit"
          if git diff --cached --quiet; then
            echo "No changes to commit, overwriting anyway"
            git commit --allow-empty -m "Update forecast_output.txt"
          else
            git commit -m "Update forecast_output.txt"
          fi

          # Push auf main
          git push origin main --force
