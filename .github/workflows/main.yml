name: Forecast

# Läuft Montag bis Freitag um 7:00 Uhr Wien-Zeit
on:
  schedule:
    - cron: '0 6 * * 1-5'  # GitHub Actions benutzt UTC, Wien = UTC+1 (im Winter)
  workflow_dispatch:  # Ermöglicht auch manuelles Starten

jobs:
  forecast:
    runs-on: ubuntu-24.04
    env:
      TZ: Europe/Vienna  # Setzt die Zeitzone für das Skript

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install dependencies if requirements.txt exists
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "No dependencies"
          fi

      - name: Run forecast script with timestamp
        run: |
          echo "Forecast generated on $(date '+%Y-%m-%d %H:%M:%S %Z')" > forecast_output.txt
          python main.py >> forecast_output.txt

      - name: Commit and push forecast output
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add forecast_output.txt
          if git diff --cached --quiet; then
            git commit --allow-empty -m "Update forecast_output.txt"
          else
            git commit -m "Update forecast_output.txt"
          fi

          git push origin main --force
