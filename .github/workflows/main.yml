name: Run Commodity Forecast 2026

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 6 * * *"   # täglich 06:00 UTC
  workflow_dispatch:

jobs:
  forecast:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run forecast system
        run: |
          python main.py

      - name: Upload forecast output
        uses: actions/upload-artifact@v4
        with:
          name: forecast-output
          path: forecast_output.txt
